<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>subkazani.ir</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Vazirmatn', sans-serif;
      min-height: 100vh;
      background: linear-gradient(160deg, #0a0a0f 0%, #1a0b2e 45%, #3b1466 80%, #6a1fb8 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* ---- Header (Telegram-channel style) ---- */
    .header {
      width: 100%;
      height: 140px;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(168, 85, 247, 0.35);
      position: relative;
      display: flex;
      justify-content: center;
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      position: absolute;
      bottom: -60px;
      background: linear-gradient(135deg, #2d1052, #12071f);
      border: 3px solid #a855f7;
      box-shadow: 0 0 35px rgba(168, 85, 247, 0.55);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ---- Main content ---- */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 120px 20px 40px;
      gap: 18px;
    }

    .fa-text {
      font-size: clamp(1.6rem, 5vw, 2.6rem);
      font-weight: 600;
      background: linear-gradient(90deg, #e9d5ff, #a855f7, #7c3aed);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: glow 4s ease-in-out infinite alternate;
    }

    .en-text {
      font-size: clamp(1rem, 3vw, 1.4rem);
      font-weight: 300;
      letter-spacing: 4px;
      color: rgba(233, 213, 255, 0.75);
      direction: ltr;
    }

    @keyframes glow {
      from { filter: drop-shadow(0 0 6px rgba(168, 85, 247, 0.3)); }
      to   { filter: drop-shadow(0 0 18px rgba(168, 85, 247, 0.8)); }
    }

    /* ---- Footer ---- */
    .footer {
      padding: 24px;
      font-size: 0.95rem;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.55);
      direction: ltr;
    }

    .footer a {
      color: #c084fc;
      text-decoration: none;
    }

    .footer a:hover {
      text-shadow: 0 0 10px rgba(192, 132, 252, 0.8);
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="avatar">
      <!-- عکس خودت رو با اسم avatar.jpg کنار این فایل بذار -->
      <img src="avatar.jpg" alt="avatar" onerror="this.style.display='none'" />
    </div>
  </header>

  <main class="content">
    <div class="fa-text">شاید در زندگی بعدی</div>
    <div class="en-text">maybe in the next life</div>
  </main>

  <footer class="footer">
    <a href="https://subkazani.ir">subkazani.ir</a>
  </footer>
</body>
</html>
